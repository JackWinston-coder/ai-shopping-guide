services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: shopping-server
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - server-data:/app/data
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: shopping-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - server
    networks:
      - app-network

volumes:
  server-data:

networks:
  app-network:
    driver: bridge
